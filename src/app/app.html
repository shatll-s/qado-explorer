<div class="app-container">
  <header class="app-header">
    <a routerLink="/" class="logo"><img src="qado-logo.svg" alt="QADO" class="logo-img">QADO Explorer</a>
    <div class="search-wrapper">
      <input #searchInput
        type="text"
        placeholder="Search by height, hash, address, or txid..."
        (keydown.enter)="onSearch(searchInput.value); searchInput.value = ''"
        class="search-input">
    </div>
  </header>
  <main class="app-main">
    <router-outlet />
  </main>
  <footer class="app-footer">
    <span>Qado Blockchain Explorer</span>
  </footer>
</div>
